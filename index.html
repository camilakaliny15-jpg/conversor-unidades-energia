<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Energia - V2</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f6f9; 
            color: #333; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
        }
        .card { 
            background: white; 
            padding: 30px;
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px;
        }
        h2 { color: #2b6cb0; margin-top: 0; text-align: center; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #2b6cb0; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        button:hover { background-color: #1a5694; }
        h3 { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #ebf8ff; 
            border-left: 4px solid #2b6cb0; 
            border-radius: 4px; 
            font-size: 16px; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Conversor de Energia ⚡</h2>
        
        <div>
            <label>Valor:</label>
            <input type="number" id="amount" placeholder="Ex: 100">
        </div>
        
        <div>
            <label>De:</label>
            <select id="fromUnit">
                <option value="J">Joule (J)</option>
                <option value="cal">Caloria (cal)</option>
                <option value="kWh">Quilowatt-hora (kWh)</option>
                <option value="BTU">BTU</option>
            </select>
        </div>

        <div>
            <label>Para:</label>
            <select id="toUnit">
                <option value="J">Joule (J)</option>
                <option value="cal">Caloria (cal)</option>
                <option value="kWh">Quilowatt-hora (kWh)</option>
                <option value="BTU">BTU</option>
            </select>
        </div>

        <button onclick="convertEnergy()">Calcular Conversão</button>

        <h3 id="resultBox" style="display: none;"></h3>
    </div>

    <script>
    function convertEnergy() {
        const amount = parseFloat(document.getElementById('amount').value);
        const from = document.getElementById('fromUnit').value;
        const to = document.getElementById('toUnit').value;
        const resultBox = document.getElementById('resultBox');

        if (isNaN(amount)) {
            resultBox.style.display = 'block';
            resultBox.innerText = 'Por favor, insira um número.';
            return;
        }

        // LÓGICA DE CONVERSÃO (Conversão usando Joule como âncora)
        const toJoule = { J: 1, cal: 4.184, kWh: 3600000, BTU: 1055.06 };
        const fromJoule = { J: 1, cal: 1 / 4.184, kWh: 1 / 3600000, BTU: 1 / 1055.06 };

        const joules = amount * toJoule[from];
        const converted = joules * fromJoule[to];

        resultBox.style.display = 'block';
        resultBox.innerText = amount + ' ' + from + ' = ' + converted.toFixed(4) + ' ' + to;
    }
    </script>
</body>
</html>
